# ---- H2 in-memory database ----
spring.datasource.url=jdbc:h2:mem:partsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- H2 web console (http://localhost:8080/h2-console) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
# Recreate the schema every time the app starts (dev only).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Make sure data.sql runs AFTER Hibernate creates the tables.
spring.jpa.defer-datasource-initialization=true

# ---- Server ----
server.port=8080

# ---- Swagger UI ----
# springdoc serves UI at /swagger-ui.html and the spec at /v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
